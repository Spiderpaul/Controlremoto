<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Control PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00adb5">

    <link rel="stylesheet" href="style.css">

</head>
<body ontouchstart="">

    <div class="dpad-container">
        <button class="dbtn btn-up" id="btnArriba">▲</button>
        <button class="dbtn btn-left" id="btnIzquierda">◀</button>
        <button class="dbtn btn-right" id="btnDerecha">▶</button>
        <button class="dbtn btn-down" id="btnAbajo">▼</button>
    </div>

    <button class="btn-play" id="botonPausa">SALTAR</button>

    <script>
        // ==========================================
        // 1. REGISTRO DEL SERVICE WORKER (Intacto)
        // ==========================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Service Worker registrado con éxito."))
                .catch(err => console.error("Error al registrar SW:", err));
        }

        // ==========================================
        // 2. CONEXIÓN AL TÚNEL WEBSOCKET (Nuevo)
        // ==========================================
        // Nota que ahora cambiamos "http://" por "ws://" (WebSocket)
        const URL_WEBSOCKET = 'ws://192.168.100.14:80'; 
        const socket = new WebSocket(URL_WEBSOCKET);

        // Mensajes de diagnóstico en la consola del celular para saber si conectó
        socket.onopen = () => console.log("¡Conectado exitosamente al servidor por WebSocket!");
        socket.onerror = (error) => console.error("Error en el WebSocket:", error);
        socket.onclose = () => console.log("Conexión WebSocket cerrada.");

        // ==========================================
        // Mapeamos los botones de la pantalla
        // ==========================================
        const botones = {
            'btnArriba': 'UP',
            'btnAbajo': 'DOWN',
            'btnIzquierda': 'LEFT',
            'btnDerecha': 'RIGHT',
            'botonPausa': 'SPACE' // Tu botón redondo
        };

        // Función mágica para registrar los eventos de presionar y soltar
        Object.keys(botones).forEach(id => {
            const el = document.getElementById(id);
            const comando = botones[id];

            if (el) {
                // Al tocar la pantalla (Presionar botón)
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    enviarComando(`${comando}_DOWN`);
                });

                // Al levantar el dedo (Soltar botón)
                el.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    enviarComando(`${comando}_UP`);
                });

                // Soporte para pruebas en PC con el mouse (opcional)
                el.addEventListener('mousedown', () => enviarComando(`${comando}_DOWN`));
                el.addEventListener('mouseup', () => enviarComando(`${comando}_UP`));
            }
        });

        function enviarComando(mensaje) {
            if (socket.readyState === WebSocket.OPEN) {
                console.log("Enviando:", mensaje);
                socket.send(mensaje);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Control PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00adb5">

    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; margin: 0; }
        .btn-play { width: 200px; height: 200px; border-radius: 50%; background: #00adb5; color: white; border: none; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-play:active { background: #393e46; transform: scale(0.95); }
    </style>
</head>
<body ontouchstart="">

    <button class="btn-play" id="botonPausa">PLAY / PAUSE</button>

    <script>
        // ==========================================
        // 1. REGISTRO DEL SERVICE WORKER (Intacto)
        // ==========================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Service Worker registrado con éxito."))
                .catch(err => console.error("Error al registrar SW:", err));
        }

        // ==========================================
        // 2. CONEXIÓN AL TÚNEL WEBSOCKET (Nuevo)
        // ==========================================
        // Nota que ahora cambiamos "http://" por "ws://" (WebSocket)
        const URL_WEBSOCKET = 'ws://192.168.100.14:80'; 
        const socket = new WebSocket(URL_WEBSOCKET);

        // Mensajes de diagnóstico en la consola del celular para saber si conectó
        socket.onopen = () => console.log("¡Conectado exitosamente al servidor por WebSocket!");
        socket.onerror = (error) => console.error("Error en el WebSocket:", error);
        socket.onclose = () => console.log("Conexión WebSocket cerrada.");

        // ==========================================
        // 3. LÓGICA DEL BOTÓN (Actualizada)
        // ==========================================
        const BOTON = document.getElementById('botonPausa');

        function enviarSeñal(e) {
            e.preventDefault(); // Evita zooms y retrasos del navegador móvil
            
            // Verificamos que el túnel de WebSocket esté abierto antes de mandar datos
            if (socket.readyState === WebSocket.OPEN) {
                console.log("Enviando ráfaga por WebSocket...");
                
                // Enviamos el comando exacto que espera tu servidor de Python: "A_PRESS"
                socket.send("A_PRESS"); 
            } else {
                console.warn("No se pudo enviar, el WebSocket no está listo o está cerrado.");
            }
        }

        // Eventos para disparar la función
        BOTON.addEventListener('touchstart', enviarSeñal);
        BOTON.addEventListener('click', enviarSeñal);
    </script>
</body>
</html>
